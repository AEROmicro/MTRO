<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MTRO</title>
    <link rel="stylesheet" href="/vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">MTRO</div>
      <div class="topbar-right">
        <div class="time-weather" aria-live="polite">
          <div class="timebar">
            <span id="utcTime">UTC --:--:--</span>
            <span id="localTime">Local --:--:--</span>
          </div>
        </div>
        <nav class="controls" aria-label="Train filter controls">
          <label for="citySearch">Search</label>
          <input id="citySearch" list="cityOptions" type="search" placeholder="Search city" autocomplete="off" />
          <datalist id="cityOptions"></datalist>
          <label for="citySelect">City</label>
          <select id="citySelect"></select>
          <label for="snapshotSelect">Time</label>
          <select id="snapshotSelect">
            <option value="live">Live</option>
          </select>
          <button id="refreshBtn" type="button">Refresh</button>
          <button id="weatherMenuBtn" type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="weatherPopover" aria-label="Open weather menu">□</button>
          <section id="weatherPopover" class="weather-popover" hidden>
            <div class="weather-popover-header">
              <h2>Weather</h2>
              <button id="weatherCloseBtn" type="button" aria-label="Close weather menu">X</button>
            </div>
            <p id="weatherSummary">Weather unavailable</p>
            <button id="tempUnitToggle" type="button">Show °C</button>
          </section>
        </nav>
      </div>
    </header>

    <main class="layout">
      <section id="map" aria-label="Train map"></section>
      <aside class="panel">
        <h1 id="panelTitle">Live Train Positions</h1>
        <p id="status" class="status">Loading data…</p>
        <ul id="trainList" class="train-list"></ul>
      </aside>
    </main>

    <script src="/vendor/leaflet/leaflet.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
